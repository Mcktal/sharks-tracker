name: X Post Tracker

on:
  schedule:
    - cron: "0 * * * *"   # runs at the top of every hour
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  track:
    runs-on: ubuntu-latest

    # ── Give the job permission to commit files back to the repo ───────────
    permissions:
      contents: write

    steps:
      # 1. Check out your repository (including seen_ids.json)
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install the two dependencies
      - name: Install dependencies
        run: pip install requests feedparser

      # 4. Run the tracker script
      #    The secrets you added in GitHub are passed as environment variables.
      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      # 5. Commit the updated seen_ids.json back to the repo
      #    (Only runs if the file actually changed.)
      - name: Save seen IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          git diff --cached --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git push
